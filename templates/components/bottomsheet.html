<!-- =====================================================
     1409 SDK — Bottom Sheet / Action Sheet Snippets
     ===================================================== -->
<style>
    /* ── Demo buttons ── */
    .bs-demo-btns {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    /* ── Drag handle ── */
    .popover--bottom .bs-handle {
        width: 36px; height: 4px;
        background: var(--border-light);
        border-radius: 2px;
        margin: -8px auto 16px;
        flex-shrink: 0;
    }

    /* ── Action sheet items ── */
    .bs-action-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .bs-action {
        display: flex; align-items: center; gap: 14px;
        padding: 14px 16px;
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        color: var(--text-primary);
        font-size: 0.95rem; font-weight: 600;
        cursor: pointer; transition: background var(--transition-base);
        font-family: inherit; width: 100%; text-align: left;
    }
    .bs-action:hover { background: var(--bg-hover); }

    .bs-action__icon {
        width: 38px; height: 38px;
        border-radius: var(--radius-sm);
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
    }
    .bs-action__label { flex: 1; }
    .bs-action__meta { font-size: 0.78rem; color: var(--text-muted); font-weight: 500; }
    .bs-action--danger { color: #ef4444; }
    .bs-action--danger .bs-action__icon { background: rgba(239,68,68,0.12); color: #ef4444; }

    /* ── List picker ── */
    .bs-picker-list {
        display: flex;
        flex-direction: column;
    }

    .bs-picker-item {
        display: flex; align-items: center; gap: 12px;
        padding: 13px 4px;
        border-bottom: 1px solid var(--border-color);
        cursor: pointer; transition: color var(--transition-base);
        font-size: 0.92rem; font-weight: 500; color: var(--text-primary);
        font-family: inherit; background: none; border-left: none; border-right: none; border-top: none; width: 100%; text-align: left;
    }
    .bs-picker-item:last-child { border-bottom: none; }
    .bs-picker-item:hover { color: var(--accent); }
    .bs-picker-item.selected { color: var(--accent); font-weight: 700; }
    .bs-picker-item__check { margin-left: auto; color: var(--accent); opacity: 0; transition: opacity 0.15s; }
    .bs-picker-item.selected .bs-picker-item__check { opacity: 1; }
</style>


<!-- ── Demo trigger buttons ── -->
<div class="bs-demo-btns">
    <button class="btn btn-glass" onclick="openPopover('bsActions')">
        <i data-lucide="more-horizontal" style="width:18px;height:18px;"></i>
        Action Sheet
    </button>
    <button class="btn btn-glass" onclick="openPopover('bsPicker')">
        <i data-lucide="list" style="width:18px;height:18px;"></i>
        Выбор корпуса
    </button>
</div>


<!-- ── 1. Action Sheet ── -->
<div class="popover-overlay popover-overlay--bottom" id="bsActions">
    <div class="popover popover--bottom">
        <div class="bs-handle"></div>
        <div class="popover__title" style="text-align:left; font-size:0.88rem; color:var(--text-muted); font-weight:600; margin-bottom:14px;">Действия с профилем</div>

        <div class="bs-action-list">
            <button class="bs-action">
                <div class="bs-action__icon" style="background:rgba(68,70,225,0.12);color:var(--accent);">
                    <i data-lucide="user-pen" style="width:18px;height:18px;"></i>
                </div>
                <div>
                    <div class="bs-action__label">Редактировать</div>
                    <div class="bs-action__meta">Изменить данные профиля</div>
                </div>
            </button>
            <button class="bs-action">
                <div class="bs-action__icon" style="background:rgba(23,201,100,0.12);color:#17c964;">
                    <i data-lucide="share-2" style="width:18px;height:18px;"></i>
                </div>
                <div>
                    <div class="bs-action__label">Поделиться</div>
                    <div class="bs-action__meta">Отправить ссылку на профиль</div>
                </div>
            </button>
            <button class="bs-action">
                <div class="bs-action__icon" style="background:rgba(245,165,36,0.12);color:#f5a524;">
                    <i data-lucide="qr-code" style="width:18px;height:18px;"></i>
                </div>
                <div>
                    <div class="bs-action__label">QR-код</div>
                    <div class="bs-action__meta">Показать QR для идентификации</div>
                </div>
            </button>
            <button class="bs-action bs-action--danger">
                <div class="bs-action__icon">
                    <i data-lucide="log-out" style="width:18px;height:18px;"></i>
                </div>
                <div class="bs-action__label">Выйти из аккаунта</div>
            </button>
        </div>

        <button class="btn btn-glass" style="margin-top:12px; width:100%;" onclick="closePopover('bsActions')">Отмена</button>
    </div>
</div>


<!-- ── 2. Picker (list select) ── -->
<div class="popover-overlay popover-overlay--bottom" id="bsPicker">
    <div class="popover popover--bottom">
        <div class="bs-handle"></div>
        <div class="popover__title">Выберите корпус</div>

        <div class="bs-picker-list">
            <button class="bs-picker-item selected" onclick="selectPicker(this)">
                <i data-lucide="building-2" style="width:18px;height:18px;flex-shrink:0;"></i>
                Модерн
                <i data-lucide="check" class="bs-picker-item__check" style="width:16px;height:16px;"></i>
            </button>
            <button class="bs-picker-item" onclick="selectPicker(this)">
                <i data-lucide="building" style="width:18px;height:18px;flex-shrink:0;"></i>
                Лицей
                <i data-lucide="check" class="bs-picker-item__check" style="width:16px;height:16px;"></i>
            </button>
            <button class="bs-picker-item" onclick="selectPicker(this)">
                <i data-lucide="school" style="width:18px;height:18px;flex-shrink:0;"></i>
                Основной
                <i data-lucide="check" class="bs-picker-item__check" style="width:16px;height:16px;"></i>
            </button>
            <button class="bs-picker-item" onclick="selectPicker(this)">
                <i data-lucide="landmark" style="width:18px;height:18px;flex-shrink:0;"></i>
                Спортивный
                <i data-lucide="check" class="bs-picker-item__check" style="width:16px;height:16px;"></i>
            </button>
        </div>

        <button class="btn btn-primary" style="margin-top:16px; width:100%;" onclick="closePopover('bsPicker')">Готово</button>
    </div>
</div>


<script>
function selectPicker(btn) {
    btn.closest('.bs-picker-list').querySelectorAll('.bs-picker-item')
        .forEach(i => i.classList.remove('selected'));
    btn.classList.add('selected');
}
</script>
