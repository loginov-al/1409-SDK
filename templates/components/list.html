<!-- =====================================================
     1409 SDK — List / Settings Row Snippets
     ===================================================== -->
<style>
    /* ════════════════════════════════════
       List group container
    ════════════════════════════════════ */
    .list-group {
        background: var(--glass-bg);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-xl);
        overflow: hidden;
    }

    /* Section label above group */
    .list-section-title {
        font-size: 0.65rem;
        font-weight: 800;
        letter-spacing: 1.8px;
        text-transform: uppercase;
        color: var(--text-muted);
        padding: 0 4px 8px;
    }

    /* ════════════════════════════════════
       List row
    ════════════════════════════════════ */
    .list-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 13px 16px;
        min-height: 52px;
        background: transparent;
        border: none;
        width: 100%;
        text-align: left;
        color: var(--text-primary);
        font-family: inherit;
        cursor: pointer;
        transition: background 0.14s ease;
        text-decoration: none;
        position: relative;
    }

    .list-row:hover  { background: var(--bg-hover); }
    .list-row:active { background: rgba(255,255,255,0.06); }

    /* Divider between rows */
    .list-row + .list-row::before {
        content: '';
        position: absolute;
        top: 0; left: 56px; right: 0;
        height: 1px;
        background: var(--border-color);
        opacity: 0.6;
    }

    /* When no icon — divider starts from left edge */
    .list-row--no-icon + .list-row--no-icon::before { left: 16px; }

    /* ── Icon cell ── */
    .list-row__icon {
        width: 32px; height: 32px;
        border-radius: 9px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        background: rgba(68,70,225,0.14);
        color: #818cf8;
    }

    /* Icon color variants */
    .list-row__icon--red    { background: rgba(230,53,48,0.14);   color: #f87171; }
    .list-row__icon--green  { background: rgba(23,201,100,0.14);  color: #4ade80; }
    .list-row__icon--yellow { background: rgba(245,165,36,0.14);  color: #fbbf24; }
    .list-row__icon--teal   { background: rgba(20,184,166,0.14);  color: #2dd4bf; }
    .list-row__icon--purple { background: rgba(139,92,246,0.14);  color: #c4b5fd; }
    .list-row__icon--gray   { background: var(--bg-secondary);    color: var(--text-muted); }

    /* ── Main content ── */
    .list-row__body {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
    }

    .list-row__label {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .list-row__sub {
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    /* ── Right side ── */
    .list-row__right {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
    }

    .list-row__value {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-muted);
    }

    /* Chevron */
    .list-row__chevron {
        color: var(--text-muted);
        opacity: 0.5;
        flex-shrink: 0;
    }

    /* Danger row */
    .list-row--danger .list-row__label { color: #f87171; }
    .list-row--danger .list-row__icon  { background: rgba(230,53,48,0.14); color: #f87171; }

    /* ── Avatar in row ── */
    .list-row__avatar {
        width: 40px; height: 40px;
        border-radius: 50%;
        overflow: hidden;
        flex-shrink: 0;
        background: linear-gradient(135deg, var(--accent), #e63530);
        display: flex; align-items: center; justify-content: center;
        font-weight: 800; font-size: 0.8rem; color: white;
    }
    .list-row__avatar img { width: 100%; height: 100%; object-fit: cover; }
</style>
