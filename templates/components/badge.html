<!-- =====================================================
     1409 SDK — Badge / Chip / Tag Snippets
     ===================================================== -->
<style>
    /* ════════════════════════════════════
       Badge — маленький счётчик / статус
    ════════════════════════════════════ */
    .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 20px;
        height: 20px;
        padding: 0 6px;
        border-radius: var(--radius-full);
        font-size: 0.68rem;
        font-weight: 800;
        line-height: 1;
        letter-spacing: 0.2px;
        white-space: nowrap;
        flex-shrink: 0;
    }

    .badge--dot {
        width: 8px; height: 8px;
        min-width: 8px; padding: 0;
        border-radius: 50%;
    }

    .badge--sm { min-width: 16px; height: 16px; font-size: 0.6rem;  padding: 0 4px; }
    .badge--lg { min-width: 24px; height: 24px; font-size: 0.76rem; padding: 0 8px; }

    .badge--accent  { background: var(--accent); color: #fff; }
    .badge--success { background: #17c964; color: #fff; }
    .badge--warning { background: #f5a524; color: #fff; }
    .badge--danger  { background: #e63530; color: #fff; }
    .badge--neutral { background: var(--bg-secondary); color: var(--text-secondary); border: 1px solid var(--border-color); }
    .badge--info    { background: rgba(68,70,225,0.18); color: #a5b4fc; }

    /* На иконке */
    .badge-wrap {
        position: relative;
        display: inline-flex;
        flex-shrink: 0;
    }
    .badge-wrap .badge {
        position: absolute;
        top: -5px; right: -7px;
        z-index: 1;
        box-shadow: 0 0 0 2px var(--bg-primary);
    }
    .badge-wrap .badge--dot { top: -1px; right: -1px; }

    /* ════════════════════════════════════
       Chip — интерактивный тег / фильтр
    ════════════════════════════════════ */
    .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        height: 32px;
        padding: 0 12px;
        border-radius: var(--radius-full);
        font-size: 0.8rem;
        font-weight: 600;
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.18s cubic-bezier(0.34, 1.4, 0.64, 1);
        user-select: none;
        white-space: nowrap;
        font-family: inherit;
    }
    .chip:hover  { background: var(--bg-hover); border-color: rgba(255,255,255,0.18); color: var(--text-primary); }
    .chip.active { background: rgba(68,70,225,0.15); border-color: rgba(68,70,225,0.4); color: #c7d2fe; }
    .chip:focus  { outline: none; }

    .chip--sm { height: 26px; padding: 0 10px; font-size: 0.74rem; gap: 4px; }
    .chip--lg { height: 38px; padding: 0 16px; font-size: 0.86rem; gap: 8px; }

    .chip__remove {
        display: flex; align-items: center; justify-content: center;
        width: 16px; height: 16px;
        border-radius: 50%;
        background: rgba(255,255,255,0.1);
        margin-right: -4px;
        transition: background 0.15s;
        flex-shrink: 0;
    }
    .chip__remove:hover { background: rgba(255,255,255,0.2); }

    .chip--success { background: rgba(23,201,100,0.1);  border-color: rgba(23,201,100,0.25); color: #4ade80; }
    .chip--warning { background: rgba(245,165,36,0.1);  border-color: rgba(245,165,36,0.25); color: #fbbf24; }
    .chip--danger  { background: rgba(230,53,48,0.1);   border-color: rgba(230,53,48,0.25);  color: #f87171; }
    .chip--accent  { background: rgba(68,70,225,0.12);  border-color: rgba(68,70,225,0.3);   color: #a5b4fc; }

    .badge-row { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
</style>


<!-- ── 1. Badge sizes & colors ── -->
<div class="badge-row" style="align-items:center;">

<!-- ── 5. Removable chips ── -->
<div class="badge-row" id="chipGroup">
    <button class="chip" onclick="removeChip(this)">
        Модерн
        <span class="chip__remove">
            <svg width="8" height="8" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </span>
    </button>
    <button class="chip" onclick="removeChip(this)">
        Лицей
        <span class="chip__remove">
            <svg width="8" height="8" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </span>
    </button>
    <button class="chip" onclick="removeChip(this)">
        9–11 классы
        <span class="chip__remove">
            <svg width="8" height="8" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </span>
    </button>
</div>

<script>
function removeChip(btn) {
    btn.style.transition = 'opacity .2s, transform .2s';
    btn.style.opacity = '0';
    btn.style.transform = 'scale(0.85)';
    setTimeout(() => btn.remove(), 200);
}
document.querySelectorAll('.chip:not([onclick])').forEach(chip => {
    chip.addEventListener('click', () => chip.classList.toggle('active'));
});
</script>
